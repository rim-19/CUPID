        <button data-action="cart" data-icbtn title="Cart" aria-label="Open bag" aria-haspopup="dialog" aria-expanded="false" style="position:relative;width:40px;height:40px;border:none;background:transparent;color:var(--ink-soft);border-radius:50%;cursor:pointer;transition:.2s;display:grid;place-items:center"><svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false" style="display:block;overflow:visible"><path d="M6.4 8.4h11.2l.85 11.2a1.5 1.5 0 0 1-1.5 1.6H7.05a1.5 1.5 0 0 1-1.5-1.6z"/><path d="M9 8.4V7a3 3 0 0 1 6 0v1.4"/></svg><span data-badge="cart" style="position:absolute;top:2px;right:0px;min-width:16px;height:16px;padding:0 4px;border-radius:99px;background:var(--accent);color:var(--accent-ink);font-size:10px;font-weight:800;display:none;align-items:center;justify-content:center;font-family:var(--mono)">0</span></button>
        <a href="#signin" data-signin data-mobilehide style="margin-left:8px;padding:10px 18px;border-radius:99px;background:var(--ink);color:var(--bg);text-decoration:none;font-weight:700;font-size:14px;transition:.25s var(--ease)">Sign in</a>
