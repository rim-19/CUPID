  <section id="newsletter" style="position:relative;z-index:2;padding:110px 28px;text-align:center;overflow:hidden">
    <div data-parallax="0.1" style="position:absolute;top:0;left:50%;width:640px;height:420px;transform:translateX(-50%);background:radial-gradient(ellipse at center,var(--glow),transparent 65%);filter:blur(8px);pointer-events:none"></div>
    <div style="position:relative;z-index:2;max-width:620px;margin:0 auto">
      <div data-reveal style="display:inline-grid;place-items:center;width:74px;height:74px;border-radius:20px;background:var(--panel);border:1px solid var(--line);color:var(--accent);margin-bottom:22px;animation:floatY 4s ease-in-out infinite;box-shadow:0 14px 36px rgba(0,0,0,.3)"><svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false" style="display:block;overflow:visible"><rect x="3.4" y="5.8" width="17.2" height="12.4" rx="1.6"/><path d="M3.9 6.7l7.1 5.1a1.7 1.7 0 0 0 2 0l7.1-5.1"/></svg></div>
      <h2 data-reveal data-reveal-delay="80" style="font-family:var(--serif);font-weight:700;font-size:clamp(32px,5vw,58px);line-height:1.02;letter-spacing:-0.02em;margin:0 0 16px">Letters from Cupid.</h2>
      <p data-reveal data-reveal-delay="140" style="color:var(--ink-soft);font-size:18px;line-height:1.6;margin:0 0 32px">A short note each week: new arrivals, staff picks, and the occasional recipe from the coffee bar.</p>
      <form data-newsletter data-reveal data-reveal-delay="200" style="display:flex;gap:10px;max-width:460px;margin:0 auto;flex-wrap:wrap;justify-content:center">
        <input type="email" placeholder="you@example.com" required style="flex:1;min-width:220px;padding:16px 20px;border-radius:99px;border:1px solid var(--line);background:var(--panel);color:var(--ink);font-size:15px;font-family:var(--sans);outline:none">
        <button type="submit" style="padding:16px 28px;border-radius:99px;background:var(--accent);color:var(--accent-ink);border:none;font-weight:800;font-size:15px;cursor:pointer;white-space:nowrap;transition:.2s">Subscribe</button>
      </form>
      <div data-news-thanks style="height:0;overflow:hidden;opacity:0;transition:.4s var(--ease);color:var(--accent-2);font-weight:700;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px"><span style="display:grid;place-items:center;color:var(--accent)"><svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" aria-hidden="true" style="display:block"><path d="M12 20.4l-1.55-1.4C6 14.95 3.2 12.4 3.2 9.2 3.2 6.65 5.2 4.7 7.7 4.7c1.5 0 2.95.7 3.9 1.8l.4.46.4-.46A5.05 5.05 0 0 1 16.3 4.7c2.5 0 4.5 1.95 4.5 4.5 0 3.2-2.8 5.75-7.25 9.82z"/></svg></span>Welcome to Cupid. Check your inbox!</div>
    </div>
  </section>
